<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Applicant Received</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f7fc; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .container { max-width: 600px; margin: 30px auto; background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
    .header { background: #8b5cf6; padding: 24px 20px; text-align: center; }
    .header h1 { color: white; font-size: 24px; font-weight: 700; margin: 0; }
    .content { padding: 32px 28px; }
    .applicant-card { background: #f8fafc; padding: 20px; border-radius: 12px; margin: 20px 0; }
    .button { display: inline-block; background: #8b5cf6; color: white !important; text-decoration: none; padding: 12px 28px; border-radius: 40px; font-weight: 600; margin: 20px 0 10px; }
    .footer { text-align: center; padding: 20px; background: #f8fafc; font-size: 12px; color: #94a3b8; border-top: 1px solid #e2e8f0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header"><h1>📌 New Applicant</h1></div>
    <div class="content">
      <p>Dear <strong>{{company_name}} Team</strong>,</p>
      <p>A new candidate has applied for your job posting <strong>{{job_title}}</strong>.</p>
      <div class="applicant-card">
        <p><strong>{{applicant_name}}</strong> · {{applicant_email}}</p>
        <p>Applied on: {{applied_date}}</p>
        <p>Cover letter preview: "{{cover_letter_preview}}"</p>
      </div>
      <p style="text-align: center;"><a href="{{applicants_url}}" class="button">Review Applicant</a></p>
    </div>
    <div class="footer"><p>SmartHire Employer Portal</p></div>
  </div>
</body>
</html>
