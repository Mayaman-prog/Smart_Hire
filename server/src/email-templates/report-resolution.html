<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Report Update</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f9fc;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            padding: 20px;
        }
        .header {
            background: #1e293b;
            padding: 20px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }
        .header h1 {
            color: #ffffff;
            margin: 0;
        }
        .content {
            padding: 20px;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        .badge.approved {
            background: #dcfce7;
            color: #166534;
        }
        .badge.removed {
            background: #fee2e2;
            color: #991b1b;
        }
        .badge.dismissed {
            background: #fef3c7;
            color: #92400e;
        }
        .btn {
            display: inline-block;
            background: #1e293b;
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Report Update</h1>
        </div>
        <div class="content">
            <h2>Hi {{reporterName}},</h2>
            <p>Your report regarding <strong>{{jobTitle}}</strong> has been resolved.</p>
            <p><strong>Reason:</strong> {{reason}}</p>
            <p><strong>Resolution:</strong> <span class="badge {{resolutionClass}}">{{resolutionLabel}}</span></p>
            {{#if resolutionNote}}<p><strong>Admin Note:</strong> {{resolutionNote}}</p>{{/if}}
            <a href="{{dashboardUrl}}" class="btn">Go to Dashboard</a>
        </div>
    </div>
</body>
</html>
